<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabricare Transfer System</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body {font-family: Arial; background:#f5f7fb; padding:20px;}
h1 {font-size:28px;}
input, select {padding:12px; margin:6px 0; width:100%;}
button {padding:12px; margin:5px; font-weight:bold;}
.card {background:#fff; padding:15px; border-radius:10px; margin-bottom:15px;}
</style>
</head>

<body>

<h1>FABRICARE TRANSFER SYSTEM</h1>

<div class="card">

<label>FROM STORE</label>
<select id="fromStore"></select>

<label>TO STORE</label>
<select id="toStore"></select>

<label>ORDER ID</label>
<input id="orderId">

<label>CUSTOMER NAME</label>
<input id="customerName">

<label>ITEM COUNT</label>
<input id="itemCount" type="number" value="1">

<label>SERVICE TYPE</label>
<select id="serviceType">
<option>Dry Cleaning</option>
<option>Alteration</option>
<option>Embroidery</option>
<option>DTF</option>
<option>Wedding Gown</option>
</select>

<label>SPECIAL INSTRUCTIONS</label>
<input id="notes">

<br>

<button onclick="startCamera()">OPEN CAMERA</button>
<button onclick="capture()">CAPTURE</button>
<button onclick="readOCR()">READ TICKET</button>
<button onclick="save()">SAVE</button>

<br><br>

<video id="video" autoplay playsinline style="width:100%"></video>
<canvas id="canvas" style="display:none"></canvas>
<img id="preview" style="width:100%; display:none">

<div id="status"></div>

</div>

<div id="list"></div>

<script>

const stores = [
'FABRICARE',
'FORT STEWART ALT',
'FORT STEWART D/C',
'HUNTER ALT',
'HUNTER D/C'
];

stores.forEach(s=>{
document.getElementById('fromStore').add(new Option(s,s));
document.getElementById('toStore').add(new Option(s,s));
});

let stream;

async function startCamera(){
stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
document.getElementById("video").srcObject = stream;
}

function capture(){
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;
canvas.getContext("2d").drawImage(video,0,0);

document.getElementById("preview").src = canvas.toDataURL();
document.getElementById("preview").style.display="block";

if(stream){stream.getTracks().forEach(t=>t.stop());}
}

async function readOCR(){
document.getElementById("status").innerText="Reading...";

const { data:{ text } } = await Tesseract.recognize(
document.getElementById("preview").src,
"eng"
);

let order = (text.match(/\d{5,}/)||[""])[0];
let name = (text.match(/[A-Z]+,\s*[A-Z]+/)||[""])[0];
let count = (text.match(/\d+\s*PC/i)||["1"])[0].replace(/\D/g,'');

document.getElementById("orderId").value = order;
document.getElementById("customerName").value = name;
document.getElementById("itemCount").value = count || 1;

document.getElementById("status").innerText="OCR DONE";
}

function save(){
const data = {
order:document.getElementById("orderId").value,
name:document.getElementById("customerName").value,
count:document.getElementById("itemCount").value,
from:document.getElementById("fromStore").value,
to:document.getElementById("toStore").value,
notes:document.getElementById("notes").value
};

let list = JSON.parse(localStorage.getItem("data")||"[]");
list.push(data);
localStorage.setItem("data",JSON.stringify(list));

render();
}

function render(){
let list = JSON.parse(localStorage.getItem("data")||"[]");
document.getElementById("list").innerHTML = list.map(i=>`
<div class="card">
<b>ORDER:</b> ${i.order}<br>
<b>CUSTOMER:</b> ${i.name}<br>
<b>FROM:</b> ${i.from}<br>
<b>TO:</b> ${i.to}<br>
<b>ITEMS:</b> ${i.count}<br>
<b>SPECIAL INSTRUCTIONS:</b> ${i.notes || "-"}
</div>
`).join('');
}

render();

</script>

</body>
</html>
